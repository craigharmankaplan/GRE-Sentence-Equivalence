[build]
  publish = "."
  functions = "netlify/functions"

# Serve sentequiv.html at the site root
[[redirects]]
  from = "/"
  to = "/sentequiv.html"
  status = 200

# Reasonable security headers.
#
# NOTE on framing: this site is embedded as an iframe inside the Atom LMS
# (https://kna.learnwithatom.com). Chrome 146+ enforces CSP frame-ancestors
# over the older X-Frame-Options header — and X-Frame-Options: DENY would
# block the iframe outright. We use frame-ancestors to allow self + the LMS
# origin (and its subdomains) and omit X-Frame-Options entirely.
[[headers]]
  for = "/*"
  [headers.values]
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"
    Content-Security-Policy = "frame-ancestors 'self' https://kna.learnwithatom.com https://*.learnwithatom.com"
